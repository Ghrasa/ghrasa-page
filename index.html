<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>GPS Auto Submit System</title>

<style>
  body {
    font-family: Arial;
    background: #eef2f7;
    text-align: center;
    padding-top: 100px;
  }

  .card {
    background: white;
    width: 360px;
    margin: auto;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 0 15px rgba(0,0,0,0.1);
  }

  #status {
    margin-top: 10px;
    font-size: 14px;
  }

  button {
    padding: 10px 15px;
    border: none;
    background: #007bff;
    color: white;
    border-radius: 6px;
    cursor: pointer;
  }
</style>
</head>

<body>

<div class="card">
  <h3>GPS Location Submit</h3>
  <p>Click to start tracking</p>

  <button onclick="start()">Start Capture</button>
  <p id="status"></p>
</div>

<script>
function start() {
  const status = document.getElementById("status");

  status.innerHTML = "Requesting location permission...";

  if (!navigator.geolocation) {
    status.innerHTML = "Geolocation not supported";
    return;
  }

  navigator.geolocation.getCurrentPosition(success, error);

  function success(pos) {

    const lat = pos.coords.latitude;
    const lon = pos.coords.longitude;
    const time = new Date().toLocaleString();

    const mapLink = `https://www.google.com/maps/search/?api=1&query=${lat},${lon}`;

    const finalData =
      "Latitude: " + lat +
      " | Longitude: " + lon +
      " | Time: " + time +
      " | Map: " + mapLink;

    status.innerHTML = "Submitting data...";

    // REAL SUBMISSION TO GOOGLE FORM
    const form = document.createElement("form");
    form.method = "POST";
    form.action = "https://docs.google.com/forms/d/e/1FAIpQLSd4KJoIXicff1vBOAH1VgmFNBFUcGBSxf6iQE08eqOSWAXC_w/formResponse";
    form.target = "hidden_iframe";

    const input = document.createElement("input");
    input.type = "hidden";
    input.name = "entry.1341563402";
    input.value = finalData;

    form.appendChild(input);
    document.body.appendChild(form);

    form.submit();

    status.innerHTML = "Redirecting...";

    // FINAL REDIRECT BACK TO YOUR FORM
    setTimeout(() => {
      window.location.href =
        "https://docs.google.com/forms/d/e/1FAIpQLSd4KJoIXicff1vBOAH1VgmFNBFUcGBSxf6iQE08eqOSWAXC_w/viewform";
    }, 2000);
  }

  function error(err) {
    status.innerHTML = "Permission denied or error: " + err.message;
  }
}
</script>

<!-- hidden iframe -->
<iframe name="hidden_iframe" style="display:none;"></iframe>

</body>
</html>
