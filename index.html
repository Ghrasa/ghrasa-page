<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>GPS Auto Submit App</title>

<style>
  body {
    font-family: Arial;
    background: linear-gradient(135deg, #eef2f7, #d9e4f5);
    text-align: center;
    padding-top: 100px;
  }

  .card {
    background: white;
    width: 340px;
    margin: auto;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 0 15px rgba(0,0,0,0.1);
  }

  #timer {
    font-size: 42px;
    color: #007bff;
    margin: 15px 0;
  }

  #status {
    font-size: 14px;
    color: #444;
  }
</style>
</head>

<body>

<div class="card">
  <h3>GPS Tracker</h3>
  <p>Capturing location automatically...</p>

  <div id="timer">5</div>
  <p id="status">Starting...</p>
</div>

<script>
let timeLeft = 5;
const timerEl = document.getElementById("timer");
const statusEl = document.getElementById("status");

// Countdown before GPS capture
const countdown = setInterval(() => {
  timeLeft--;
  timerEl.innerHTML = timeLeft;

  if (timeLeft === 0) {
    clearInterval(countdown);
    getLocation();
  }
}, 1000);

function getLocation() {

  if (!navigator.geolocation) {
    statusEl.innerHTML = "Geolocation not supported";
    return;
  }

  statusEl.innerHTML = "Getting GPS...";

  navigator.geolocation.getCurrentPosition(function(pos) {

    const lat = pos.coords.latitude;
    const lon = pos.coords.longitude;
    const time = new Date().toLocaleString();

    const mapLink = `https://www.google.com/maps/search/?api=1&query=${lat},${lon}`;

    const finalData =
      "Latitude: " + lat +
      " | Longitude: " + lon +
      " | Time: " + time +
      " | Map: " + mapLink;

    statusEl.innerHTML = "Submitting...";

    // SUBMIT TO GOOGLE FORM
    const formURL = "https://docs.google.com/forms/d/e/1FAIpQLSd4KJoIXicff1vBOAH1VgmFNBFUcGBSxf6iQE08eqOSWAXC_w/formResponse";

    const data = new FormData();
    data.append("entry.1341563402", finalData);

    fetch(formURL, {
      method: "POST",
      body: data,
      mode: "no-cors"
    });

    statusEl.innerHTML = "✅ Submitted successfully";

  }, function(err) {
    statusEl.innerHTML = "❌ Error: " + err.message;
  });
}
</script>

</body>
</html>
