<!DOCTYPE html>
<!DOCTYPE html>
<html>
<head>
<title>GPS Auto Submit</title>

<style>
  body {
    font-family: Arial;
    background: #f4f6f8;
    text-align: center;
    padding-top: 100px;
  }

  .card {
    background: white;
    width: 320px;
    margin: auto;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 0 12px rgba(0,0,0,0.1);
  }

  #timer {
    font-size: 40px;
    color: #007bff;
    margin: 15px 0;
  }

  #status {
    font-size: 14px;
    color: #333;
  }
</style>
</head>

<body>

<div class="card">
  <h3>Location Tracker</h3>
  <p>Auto submitting your location...</p>

  <div id="timer">5</div>
  <p id="status">Starting...</p>
</div>

<!-- Hidden iframe (prevents page redirect during submit) -->
<iframe name="hidden_iframe" style="display:none;"></iframe>

<script>
let count = 5;
const timerEl = document.getElementById("timer");
const statusEl = document.getElementById("status");

// Countdown timer
const interval = setInterval(() => {
  count--;
  timerEl.innerHTML = count;

  if (count === 0) {
    clearInterval(interval);
    getLocation();
  }
}, 1000);

function getLocation() {

  if (!navigator.geolocation) {
    statusEl.innerHTML = "Geolocation not supported";
    return;
  }

  statusEl.innerHTML = "Getting location...";

  navigator.geolocation.getCurrentPosition(function(pos) {

    const lat = pos.coords.latitude;
    const lon = pos.coords.longitude;
    const time = new Date().toLocaleString();

    // Google Maps link
    const mapLink = `https://www.google.com/maps/search/?api=1&query=${lat},${lon}`;

    // Final formatted data
    const value =
      "Latitude: " + lat +
      " | Longitude: " + lon +
      " | Time: " + time +
      " | Map: " + mapLink;

    statusEl.innerHTML = "Submitting data...";

    // Create form dynamically
    const form = document.createElement("form");
    form.method = "POST";
    form.action = "https://docs.google.com/forms/d/e/1FAIpQLSd4KJoIXicff1vBOAH1VgmFNBFUcGBSxf6iQE08eqOSWAXC_w/formResponse";
    form.target = "hidden_iframe";

    // Your Google Form field
    const input = document.createElement("input");
    input.type = "hidden";
    input.name = "entry.1341563402";
    input.value = value;

    form.appendChild(input);
    document.body.appendChild(form);

    // Submit to Google Form
    form.submit();

    statusEl.innerHTML = "✅ Submitted successfully";

    // Redirect AFTER submission
    setTimeout(() => {
      window.location.href =
        "https://docs.google.com/forms/d/e/1FAIpQLSd4KJoIXicff1vBOAH1VgmFNBFUcGBSxf6iQE08eqOSWAXC_w/viewform";
    }, 1500);

  }, function(err) {
    statusEl.innerHTML = "❌ Error: " + err.message;
  });
}
</script>

</body>
</html>
