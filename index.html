<!DOCTYPE html>
<html>
<head>
  <title>Get Location</title>
</head>
<body>

<h2>Click to Share Location</h2>
<button onclick="getLocation()">Get Location</button>

<p id="status"></p>

<script>
function getLocation() {
  const status = document.getElementById("status");

  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      function(position) {
        const lat = position.coords.latitude;
        const lon = position.coords.longitude;

        // Replace with your Google Form prefill link
        const formURL = "https://docs.google.com/forms/d/e/FORM_ID/viewform?entry.123456789=" 
                        + lat + "," + lon;

        status.innerHTML = "Redirecting to form...";
        window.location.href = formURL;
      },
      function(error) {
        status.innerHTML = "Error getting location: " + error.message;
      }
    );
  } else {
    status.innerHTML = "Geolocation not supported by this browser.";
  }
}
</script>

</body>
</html>
